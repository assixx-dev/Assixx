<!doctype html>
<html lang="de" class="dark">
  <head>
    <meta charset="utf-8" />
    <!-- 192×192 PNG: nur via site.webmanifest (PWA-Install-Icon).
         Kein zusätzliches <link rel="icon" sizes="192x192">, sonst fetcht der
         Browser dieselbe Datei zweimal (Link-Tag + Manifest-Parse) — siehe
         Network-Audit 2026-05-05. Tab-Icon liefert das 32×32-PNG/48×48-ICO. -->
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
    <link rel="icon" sizes="48x48" href="%sveltekit.assets%/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#121212" />

    <!-- Web Fonts (Outfit + Material Symbols Outlined): SELF-HOSTED via
         design-system/tokens/fonts.css using @fontsource(-variable). Vite
         resolves the npm packages and serves WOFF2 from same origin → ZERO
         third-party transmission to fonts.googleapis.com / fonts.gstatic.com.
         WHY: LG München I, 20.01.2022 (3 O 17493/20) — direct loading from
         Google Fonts transmits user IPs without consent and violates DSGVO
         Art. 6. dns-prefetch / preconnect to Google Fonts removed accordingly.
         TRADE-OFF Material Symbols: fontsource ships full latin subset
         (~317 KB WOFF2) with all glyphs, vs. Google's URL-icon-subset which
         only sent the 17 used glyphs (~5–10 KB). Subsetting via pyftsubset
         tracked as future optimization. -->

    <!-- FOUT Prevention: Hide Material Icons until font loads (Font Loading API) -->
    <!-- Problem: Even with display=block, browser may briefly show text before CSS parses -->
    <!-- Solution: CSS hides icons → JS detects font load → adds class to show icons -->
    <style>
      .material-symbols-outlined {
        visibility: hidden;
      }
      .fonts-loaded .material-symbols-outlined {
        visibility: visible;
      }
    </style>
    <script nonce="%sveltekit.nonce%">
      (function () {
        // FOUC Prevention: Apply theme before first paint
        // Default is dark (html has class="dark"). Remove if user chose light.
        // Landing, login, signup are ALWAYS dark - never remove dark class there.
        var theme = localStorage.getItem('theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        }

        // Font loading detection
        if (document.fonts && document.fonts.check('1em "Material Symbols Outlined"')) {
          document.documentElement.classList.add('fonts-loaded');
        } else if (document.fonts) {
          document.fonts.ready.then(function () {
            document.documentElement.classList.add('fonts-loaded');
          });
        } else {
          document.documentElement.classList.add('fonts-loaded');
        }
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="tap">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
